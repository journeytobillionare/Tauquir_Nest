<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tauquir's Nest</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->

    <header>
      <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">
          ☰
        </button>

        <h1>Tauquir's Nest</h1>
      </div>

      <!-- HAMBURGER MENU -->

      <div class="mobile-menu" id="mobileMenu">
        <a href="#thoughts">🧠 Thoughts</a>

        <a href="#vocab">📘 Vocabulary</a>

        <a href="#blogs-section">✍️ Blogs</a>
        
       
      </div>

      <!-- PROFILE -->

      <img src="profile.jpeg" alt="Profile Photo" class="profile-photo" />

      <p>Thoughts • Vocabulary • Blogs</p>
    </header>

    <!-- MAIN CONTAINER -->

    <div class="container">
      <!-- THOUGHTS -->

      <div class="card" id="thoughts">
        <h2>Personal Thoughts</h2>

        <input type="text" id="postTitle" placeholder="Thought title" />

        <textarea
          id="postContent"
          placeholder="Write your thoughts..."
        ></textarea>

        <button onclick="addPost()">Add Thought</button>

        <div id="posts"></div>
      </div>

      <!-- VOCABULARY -->

      <div class="card" id="vocab">
        <h2>English Vocabulary</h2>

        <input type="text" id="word" placeholder="Word" />

        <input type="text" id="meaning" placeholder="Meaning" />

        <button onclick="addVocabulary()">Save Word</button>

        <div id="vocabulary"></div>
      </div>

      <!-- BLOGS -->

      <div class="card blog-card" id="blogs-section">
        <h2>Write Blog</h2>

        <input type="text" id="blogTitle" placeholder="Blog title" />

        <textarea
          id="blogContent"
          placeholder="Write your blog..."
        ></textarea>

        <button onclick="addBlog()">Publish Blog</button>

        <div id="blogs"></div>
      </div>
    </div>

    <!-- SCRIPT -->

    <script type="module" src="script.js"></script>
  </body>
</html>
